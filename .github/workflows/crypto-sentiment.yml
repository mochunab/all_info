name: Crypto Sentiment + Signals (5min)

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  sentiment-and-signals:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Process sentiment
        run: |
          response=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            -d '{"phase":"sentiment"}' \
            "${{ secrets.SITE_URL }}/api/crypto/crawl")

          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | sed '$d')

          echo "Sentiment: HTTP $http_code"
          echo "$body" | head -20

      - name: Generate signals + knowledge graph
        run: |
          response=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            -d '{"phase":"signals"}' \
            "${{ secrets.SITE_URL }}/api/crypto/crawl")

          http_code=$(echo "$response" | tail -1)
          echo "Signals: HTTP $http_code"
