name: Crypto Crawler

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Trigger crypto crawl
        run: |
          response=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.SITE_URL }}/api/crypto/crawl")

          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | sed '$d')

          echo "HTTP $http_code"
          echo "$body" | head -50

          if [ "$http_code" -ge 400 ]; then
            echo "::error::Crypto crawl failed with HTTP $http_code"
            exit 1
          fi
