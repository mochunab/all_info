name: Crypto Crawler

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Phase 1a: Reddit 크롤링 (GitHub Actions에서 직접 실행 — Vercel IP 차단 우회)
      - name: Reddit crawl
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          SITE_URL: ${{ secrets.SITE_URL }}
        run: npx tsx scripts/crypto-reddit-crawl.ts

      # Phase 1b+: Telegram + Sentiment + Signals (Vercel API)
      - name: Trigger Vercel crawl (Telegram + pipeline)
        run: |
          response=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            -d '{"phase":"crawl"}' \
            "${{ secrets.SITE_URL }}/api/crypto/crawl")

          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | sed '$d')

          echo "HTTP $http_code"
          echo "$body" | head -50

          if [ "$http_code" -ge 400 ]; then
            echo "::error::Crypto crawl failed with HTTP $http_code"
            exit 1
          fi

      # Battle + Prices는 crypto-battle.yml (5분 주기)에서 별도 실행
